# 🌍 可持续星球 EART11100

## 🧭 主线 & 考试
### 七大主线
- 三重行星危机：气候 + 生物多样性丧失 + 污染
- 解决一个问题 → 常加剧另一个
- Remember the soil 别忘了土壤
- `Fe²⁺` 可溶/迁移 ｜ `Fe³⁺` 难溶/固相
- 共生 & 进化的力量 → 基于自然方案 `NBS`
- 没有银弹 no silver bullet → 多管齐下
- 流体成矿 · 矿床常伴生多金属
### 考试形式
- 线上闭卷 · 2 小时
- 40 道 MCQ（SN 20 + VC 20）
- 6 道简答题 ×10 分 = 60%
- 简答要点
  - 答所问的问题（别绕圈）
  - 约 200–250 字
  - 用证据支撑
  - 散文，非 bullet points
  - 恰当处关联 SDG（不必背编号）

## ① 导论 & SDGs `VC/SN`
### 根源
- 人口 82 亿 → 食物/水/能源需求
- UN(1945) · SDGs · 2030 行动十年
### 关键 SDG（2024 状态）
- 2 粮食 *倒退*：N/P/K、Haber-Bosch
- 6 水 *中度*：仅 0.65% 可用淡水
- 7 能源 *中度*：化石仍 81.5%
- 11 城市：占地 3% → 75% 碳排
- 12 消费 *停滞*：1/3 粮食浪费、循环经济
- 13 气候 *边际*：1°C→减产5%、水泥CO₂、临界点
- 14 水下 *倒退*：塑料、锰结核 "能做≠应做"
- 15 陆地 *倒退*：森林>80%物种、生物多样性≠丰富度
### 三重行星危机（互联，不可孤立解决）
### 论文 Hepburn 2019 *Nature*
- 评估 10 类 CO₂ 利用/移除路径
- 建材封存有前景；不确定性大
- 读摘要：末句=关键结论

## ② 土壤·化肥·水 `VC` `SDG2/6`
### 资源导论
- 铜生命周期 Bingham Canyon · 黄铜矿 · 浮选
- 资源 Resource / 储量 Reserve / 矿石 Ore
### 土壤 Soils
- 45% 矿物 + 水气 + 5% 有机质
- 成土六因素：母质/气候/植被/生物/地形/时间
- 化学风化：水解·水合·碳酸化·氧化
- Goldich 序列（石英抗风化，橄榄石易）
- 黏土 & 阳离子交换容量 `CEC`
- 层位 O→A→B→C→R(基岩)
- 仅 10% 陆地高产却产 97% 粮食
### 化肥 N/P/K
- N：Haber-Bosch（N₂+3H₂→2NH₃，铁催化）
- P：磷灰石；沉积型(主) vs 火成型
- K：蒸发岩；Boulby 矿(杂卤石)
- 隐患：伴生铀、富营养化(瑙鲁)
### 水 Water
- 总水 97% 咸；可饮 <0.05% 溶解固体
- 孔隙度 Porosity vs 渗透率 Permeability
- 承压(古老) vs 非承压(年轻)
- 过度抽取：降落漏斗、海水入侵
- 虚拟水 virtual water
- 海水淡化：反渗透为主
### 论文：全球城市水短缺
- 2050 缺水人口 >20 亿（印度最重）
- 七大方案皆有环境权衡

## ③ 粮食危机 & 植物-土壤 `SN` `SDG2`
### 两大问题
- 土壤退化（侵蚀最严重；1930s Dust Bowl）
  - 解决：带状种植、免耕、覆盖作物、梯田
- 温室气体（农业~25%）
  - CH₄ 28× ｜ `N₂O` 265×（最强效）
### 反硝化 Denitrification → N₂O 主源
- NO₃⁻→NO₂⁻→NO→N₂O→N₂
- 基因 nar/nirS/norB/`nosZ`
- nosZ 不发生 → N₂O 逸散
- 控制：氧气、土壤水分>70%→N₂、低pH→更多N₂O
### 植物获取养分
- >90% 陆生植物靠共生
- 菌根 Mycorrhizas
  - AM 丛枝（对作物最重要）
  - ECM 外生（蘑菇+菌丝网）
  - 1 克土含 10–100 m 菌丝
  - 可直接吸收有机氮(甘氨酸)·双标记实验
- 固氮 N Fixation
  - 豆科 + 根瘤菌 · 固氮酶 nitrogenase
  - 生物固氮~175 是非生物~80 两倍多
  - 例外：十字花科不共生→需化肥
### 论文 New Phytologist 2019（荟萃分析）
- AM 多数提高产量，但非铁律
### 📝 简答范例：如何减少农田 N₂O
- 保持好氧/良好排水 · 避免过量施氮

## ④ 铁 & 电池关键矿产 `VC` `SDG12`
### 成矿过程
- 富集：铁铝 3–10×，金 ~4000×
- 从流体中沉淀（来源→搬运→沉淀）
- 好矿石：品位 grade is king、矿物学、副产品
- 关键材料：高供应风险（钴→刚果DRC）
### 铁 Iron
- `Fe²⁺`(可溶) vs `Fe³⁺`(难溶)
- 残积/红土（也产镍、铝土矿）
- 条带状铁建造 `BIFs`（最重要）
  - 仅前寒武纪 · 蓝细菌产氧 + 海洋铁
- 炼钢需廉价能源 → 产钢≠产矿国
### 电池金属
- Mn 锰：90% 用于钢；结核 1000年/1mm
- Al 铝：铝土矿；冶炼极耗能
- Ni 镍：Sudbury 陨石坑；硫化物+红土
- Cu 铜：斑岩铜矿；伴生 Au/Mo
- Li 锂：伟晶岩 + 卤水（每吨耗水 50万加仑）
- Co 钴：DRC 过半；中非铜带
- 斑岩铜矿：蒸汽爆炸→裂隙脉沉淀→多期叠加
- 铁帽 gossan = 找矿标志
### 论文 Herrington《绿色经济原材料挑战》
- 回收不足以满足需求 · 采矿前置~16年
- cradle-to-cradle 从摇篮到摇篮

## ⑤ 生物多样性 & 生态功能 + 磷 `SN` `SDG15`
### 核心问题
- 生物多样性本身是否影响生态系统功能？
### 定义 & 衡量
- 协同演化：兰花 ⇄ 天蛾（达尔文预言）
- 尺度：α(生境内)/β(系统间)/γ(区域)
- 丰富度 + 均匀度 = 香农指数
- 性状 traits（功能=做什么）
### BEF 三机制
- 生态位分化 · 拮抗 · 促进(菌根)
- BEF-China / Jena 大尺度实验
- 治学："发表≠没问题"
### 磷 Phosphorus（David Johnson）
- 磷酸酶：有机磷→无机磷
- 磷"很黏 sticky"：难吸收·遗留效应·无银弹
- 菌根磷生态位分割
  - ECM 冠层→难分解磷
  - AM 林下→易利用磷
- 共限制 co-limitation：C/N/P 不独立
### 论文 BEF-China *Science*
- 16种林碳储量 2倍+ 于单栽培
- 4→8 种是"甜点"区间

## ⑥ 工业矿物 & 化石燃料 `VC` `SDG13/7`
### 工业矿物
- 建材：花岗岩/砂岩/大理石/板岩
- 骨料 aggregates（价值仅次化石燃料）
- 水泥：1500°C 烧结释大量 CO₂
- 玻璃：非晶态 + 退火
- 钻石：金伯利岩管；仅~3%含钻显著
- 金：热液型 vs 砂矿型；Witwatersrand 3.5km
- 稀土 REE：并不稀有；离子吸附型黏土(华南)
### 化石燃料
- 仅 1% 有机质被保存
- 煤阶：泥炭→褐煤→烟煤→无烟煤
  - 含碳量↑ H/O↓；泥盆纪前无煤
- 油气三阶段
  - 成岩(干酪根 kerogen)→成熟/裂解→变生
  - 气在油之上
- 油气圈闭四要素：源岩+储层+盖层+圈闭
- 峰值石油：消耗量是发现量 4倍
- 非常规：油砂/油页岩/煤层气/页岩气(fracking)
### 论文《1.5°C 不可开采化石燃料》
- 煤几乎全留地下 · 依赖碳捕集

## ⑦ CCUS 碳捕集利用封存 `SN` `SDG13`
### CCUS = 相互关联的工具箱
### 捕集 Capture（多基于自然）
- 土壤碳封存 · 栖息地恢复(湿地/蓝碳)
- 造林 · 生物炭(热解) · 增强岩石风化

### 利用 Utilisation（偏前沿）
- 警示："利用不必然减排"
- LanzaTech 产乙酸菌(Wood-Ljungdahl)
- 嗜盐菌 Halomonas（免无菌优势）
- Nixon 冰岛微生物组
### 封存 Storage（即"处置"）
- 深度 >800m · 盖层 · 容量
- 地层：咸水层 > 枯竭油气藏 > 玄武岩
- 案例：Sleipner / Gorgon / Carbfix
- 六大圈闭机制（随时间更安全）
  - 残余·构造·溶解·微生物·矿化·吸附

### 论文 Tyne 2021 *Nature*
- Olla 油田 CO₂ 30年内~13–19%被微生物转甲烷
- 惰性气体 + 同位素指纹

### 核能 Nuclear
- 燃料 `²³⁵U`；`U⁴⁺`(难溶)⇌`U⁶⁺`(可溶)

## ⑩ 新兴污染物 `SN` `SDG3/6/12/14`
### 框架：人类世 Anthropocene
### 核心区分（重点）
- Contaminant：超背景，未必有害
- Pollutant：造成危害的 contaminant
- 转变取决于"危害证据"
### 塑料 Plastics
- 有用属性=持久原因(强键/抗生物/疏水)
- 可回收 ≠ 被回收（链变短·全球废物贸易）
- 微塑料 <5mm：无处不在(含人体)
  - 河流是高速路（曼彻斯特最高）
  - 海斗深渊=终极汇
- NBS：PETase/HotPETase、贻贝过滤
### PFAS 永久化学品
- 极强 C–F 键 → 抗一切降解
- 来源：灭火泡沫(最大)、不粘锅
- 生物累积放大 → 明确 pollutant
- 应对：活性炭/焚烧/人工湿地
### 论文《全球河流药物污染》*PNAS*
- 258河流·61种API
- 25.7% 点超安全浓度
- 抗菌药 / AMR 尤其担忧

<script>
const PALETTE = ['#7a6a3a','#3d566e','#2f5d3a','#a8442a','#6d3a5d','#b9772e',
                 '#2c6b6b','#8a5a44','#4a7043','#9c6b1f','#34487a'];
const ROOT_COLOR = '#2a2a26';

let mm, rootData;

function colorByBranch(node){
  const path = (node && node.state && node.state.path) ? node.state.path : '1';
  const seg = String(path).split('.');
  if (seg.length <= 1) return ROOT_COLOR;
  const topIdx = parseInt(seg[1], 10) || 1;
  return PALETTE[(topIdx - 1) % PALETTE.length];
}

function walk(node, depth, fn){
  fn(node, depth);
  (node.children || []).forEach(c => walk(c, depth + 1, fn));
}

function fitMap(){ if(mm) mm.fit(); }

// 取 markmap 内部持有的（已初始化、带 state 的）数据树
function getData(){ return (mm && mm.state && mm.state.data) ? mm.state.data : rootData; }

// 直接改 fold 后重绘；renderData 不会像 setData 那样重新套用 initialExpandLevel
function rerender(){
  if(!mm) return;
  const r = mm.renderData ? mm.renderData() : mm.setData(getData());
  Promise.resolve(r).then(() => mm.fit()).catch(() => mm.fit());
}

function expandAll(){
  if(!mm) return;
  walk(getData(), 0, (n) => { n.payload = n.payload || {}; n.payload.fold = 0; });
  rerender();
}

function collapseAll(){
  if(!mm) return;
  // 折叠所有一级分支，仅保留主干（根 + 11 个分支）
  walk(getData(), 0, (n, d) => { n.payload = n.payload || {}; n.payload.fold = d >= 1 ? 1 : 0; });
  rerender();
}

// —— 轻量内联 Markdown → HTML —— //
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineMd(s){
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return s;
}

// —— 把 #/##/###/- 大纲解析为 markmap 节点树（INode） —— //
function parseOutline(text){
  const lines = text.split('\n');
  const root = { content:'', children:[], payload:{} };
  let rootSet = false;
  let stack = [{ depth:0, node:root }];
  let curHeadingDepth = 0;
  for(const raw of lines){
    if(!raw.trim()) continue;
    let depth, contentRaw;
    const h = raw.match(/^(#{1,6})\s+(.*)$/);
    if(h){
      depth = h[1].length;          // # =1, ## =2, ### =3
      contentRaw = h[2];
      curHeadingDepth = depth;
    } else {
      const l = raw.match(/^(\s*)-\s+(.*)$/);
      if(!l) continue;
      const indent = l[1].replace(/\t/g,'  ').length;
      depth = curHeadingDepth + 1 + Math.floor(indent/2);
      contentRaw = l[2];
    }
    const node = { content: inlineMd(contentRaw), children:[], payload:{} };
    if(depth === 1 && !rootSet){      // 第一行 # 作为根节点
      root.content = node.content;
      stack = [{ depth:1, node:root }];
      rootSet = true;
      continue;
    }
    while(stack.length && stack[stack.length-1].depth >= depth) stack.pop();
    (stack.length ? stack[stack.length-1].node : root).children.push(node);
    stack.push({ depth, node });
  }
  return root;
}

(function init(){
  try{
    const Markmap = window.markmap && window.markmap.Markmap;
    if(!Markmap) throw new Error('markmap-view 未加载');
    const md = document.getElementById('md').textContent;
    rootData = parseOutline(md);
    mm = Markmap.create('#mindmap', {
      initialExpandLevel: 2,
      duration: 420,
      maxWidth: 340,
      spacingVertical: 9,
      spacingHorizontal: 96,
      paddingX: 14,
      color: colorByBranch,
      lineWidth: (node) => Math.max(1.4, 4 - ((String(node?.state?.path||'1').split('.').length)) * 0.5),
    }, rootData);
    document.getElementById('status').classList.add('hidden');
    setTimeout(fitMap, 200);
    window.addEventListener('resize', () => mm && mm.fit());
  }catch(err){
    const s = document.getElementById('status');
    s.classList.remove('hidden');
    s.textContent = '思维导图加载失败（可能是网络/CDN 问题）。错误：' + err.message;
    console.error(err);
  }
})();
</script>
