<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>神秘学手册 · Liber Operationis</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #f1e8d4;
    --paper-warm: #ebdfc4;
    --paper-shadow: #d4c5a3;
    --ink: #221c10;
    --ink-soft: #4a3e28;
    --ink-faint: #7a6a48;
    --ink-rule: #8a7a58;
    --rubric: #8a2218;
    --rubric-soft: #a84a3a;
    --gilt: #8a6a1a;

    --serif-disp: "Cormorant Garamond", "Noto Serif SC", "Songti SC", serif;
    --serif: "EB Garamond", "Noto Serif SC", "Songti SC", serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--serif);
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.4), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(120,90,40,0.10), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.45 0 0 0 0 0.36 0 0 0 0 0.18 0 0 0 0.22 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.65;
  }
  a { color: var(--rubric); text-decoration: none; border-bottom: 1px dotted var(--rubric-soft); }
  a:hover { color: var(--ink); border-bottom-color: var(--ink); }
  ::selection { background: var(--gilt); color: var(--paper); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-rule); border-radius: 0; }

  /* Print */
  @media print {
    body { background: white; }
    .no-print { display: none !important; }
    .book { box-shadow: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
window.addEventListener('error', function(e) {
  const r = document.getElementById('root');
  if (r && !r.innerHTML) r.innerHTML = '<pre style="padding:24px;font:12px monospace;color:#8a2218">' + e.message + ' @ ' + (e.filename||'') + ':' + (e.lineno||0) + '</pre>';
});
</script>

<script type="text/babel" src="liber-data.jsx"></script>
<script type="text/babel" src="liber-tools.jsx"></script>
<script type="text/babel" src="liber-chapters.jsx"></script>
<script type="text/babel" src="liber-app.jsx"></script>
</body>
</html>
